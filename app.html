<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JackTracker - Personal Wellness App</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #e8eaf0;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        /* Neon glow effect */
        @keyframes neonGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 140, 0, 0.5), 0 0 20px rgba(255, 140, 0, 0.3); }
            50% { text-shadow: 0 0 20px rgba(255, 140, 0, 0.8), 0 0 40px rgba(255, 140, 0, 0.5); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ── Colors: Dark with Bright Orange Neon ──
        const C = {
            bg: '#0a0a0a',           // Pure black
            surface: '#0f0f12',       // Very dark gray
            card: '#15151b',          // Slightly lighter for cards
            border: 'rgba(255, 140, 0, 0.2)',  // Subtle orange border
            accent: '#ff8c00',        // Bright orange (main neon)
            accentGlow: 'rgba(255, 140, 0, 0.4)',  // Orange glow
            hot: '#ff6b6b',
            hotGlow: 'rgba(255, 107, 107, 0.3)',
            gold: '#ffd700',
            green: '#06d6a0',
            text: '#e8eaf0',
            muted: 'rgba(232, 234, 240, 0.4)',
            dim: 'rgba(232, 234, 240, 0.2)',
            neon: '#ff8c00',          // Primary neon orange
            neonGlow: 'rgba(255, 140, 0, 0.6)',
        };

        // ── Storage ──
        let db = {
            user: null,
            sessions: [],
            customWords: [],
            wordCounts: {},
        };

        function loadDB() {
            try {
                const stored = localStorage.getItem('jacktracker_db');
                if (stored) db = JSON.parse(stored);
            } catch (e) {
                console.log('Using in-memory storage');
            }
        }

        function saveDB() {
            try {
                localStorage.setItem('jacktracker_db', JSON.stringify(db));
            } catch (e) {
                console.log('Could not save to localStorage');
            }
        }

        loadDB();

        // ── Utility Functions ──
        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h}h ${m}m ${s}s`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function getCleverStats(sessions) {
            const stats = {};
            
            sessions.forEach(s => {
                const date = new Date(s.date);
                const dateStr = date.toDateString();
                if (!stats[dateStr]) stats[dateStr] = 0;
                stats[dateStr]++;
            });

            return {
                totalSessions: sessions.length,
                totalStrokes: sessions.reduce((a, s) => a + s.strokes, 0),
                totalDuration: sessions.reduce((a, s) => a + s.duration, 0),
                avgStrokes: sessions.length ? Math.round(sessions.reduce((a, s) => a + s.strokes, 0) / sessions.length) : 0,
                avgDuration: sessions.length ? Math.round(sessions.reduce((a, s) => a + s.duration, 0) / sessions.length) : 0,
                peakRate: Math.max(...sessions.map(s => s.spm || 0), 0),
                longestSession: Math.max(...sessions.map(s => s.duration || 0), 0),
                mostStrokes: Math.max(...sessions.map(s => s.strokes || 0), 0),
                sessionsPerDay: Math.max(...Object.values(stats), 0),
                topPartner: getMostCommon(sessions.map(s => s.partner).filter(Boolean)) || 'Solo',
                topLocation: getMostCommon(sessions.map(s => s.location).filter(Boolean)) || 'Home',
                topRating: sessions.length ? Math.round(sessions.reduce((a, s) => a + (s.rating || 0), 0) / sessions.length) : 0,
                topAttractiveness: sessions.length ? Math.round(sessions.reduce((a, s) => a + (s.attractiveness || 0), 0) / sessions.length) : 0,
            };
        }

        function getMostCommon(arr) {
            if (!arr.length) return null;
            const counts = {};
            arr.forEach(item => {
                counts[item] = (counts[item] || 0) + 1;
            });
            return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        }

        // ── LOGIN SCREEN ──
        function LoginScreen({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            function handleLogin(e) {
                e.preventDefault();
                if (!username.trim()) {
                    setError('Please enter a username');
                    return;
                }
                if (!password.trim()) {
                    setError('Please enter a password');
                    return;
                }
                db.user = { username, createdAt: new Date().toISOString() };
                saveDB();
                onLogin();
            }

            return (
                <div style={{
                    minHeight: '100vh',
                    background: `linear-gradient(135deg, ${C.bg}, ${C.surface})`,
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: '20px',
                }}>
                    <div style={{
                        background: C.card,
                        border: `2px solid ${C.neon}`,
                        borderRadius: '16px',
                        padding: '40px',
                        maxWidth: '400px',
                        width: '100%',
                        boxShadow: `0 0 60px ${C.neonGlow}`,
                    }}>
                        <div style={{ textAlign: 'center', marginBottom: '40px' }}>
                            <div style={{ fontSize: '64px', marginBottom: '20px' }}>🍆</div>
                            <h1 style={{
                                fontSize: '32px',
                                fontWeight: 700,
                                color: C.neon,
                                textShadow: `0 0 20px ${C.neonGlow}`,
                                marginBottom: '10px',
                            }}>
                                JackTracker
                            </h1>
                            <p style={{ color: C.muted, fontSize: '14px' }}>
                                Personal Sexual Wellness Tracker
                            </p>
                        </div>

                        <form onSubmit={handleLogin}>
                            <div style={{ marginBottom: '20px' }}>
                                <label style={{ display: 'block', marginBottom: '8px', fontSize: '14px', color: C.muted }}>
                                    Username
                                </label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    placeholder="Enter username"
                                    style={{
                                        width: '100%',
                                        padding: '12px',
                                        background: C.surface,
                                        border: `1px solid ${C.border}`,
                                        borderRadius: '8px',
                                        color: C.text,
                                        fontSize: '14px',
                                        outline: 'none',
                                    }}
                                />
                            </div>

                            <div style={{ marginBottom: '20px' }}>
                                <label style={{ display: 'block', marginBottom: '8px', fontSize: '14px', color: C.muted }}>
                                    Password
                                </label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="Enter password"
                                    style={{
                                        width: '100%',
                                        padding: '12px',
                                        background: C.surface,
                                        border: `1px solid ${C.border}`,
                                        borderRadius: '8px',
                                        color: C.text,
                                        fontSize: '14px',
                                        outline: 'none',
                                    }}
                                />
                            </div>

                            {error && (
                                <div style={{
                                    padding: '12px',
                                    background: `rgba(255, 107, 107, 0.1)`,
                                    border: `1px solid ${C.hot}`,
                                    borderRadius: '8px',
                                    color: C.hot,
                                    fontSize: '13px',
                                    marginBottom: '20px',
                                }}>
                                    ⚠️ {error}
                                </div>
                            )}

                            <button
                                type="submit"
                                style={{
                                    width: '100%',
                                    padding: '14px',
                                    background: `linear-gradient(135deg, #4a3000, ${C.neon})`,
                                    border: `1px solid ${C.neon}`,
                                    borderRadius: '8px',
                                    color: 'white',
                                    fontSize: '16px',
                                    fontWeight: 600,
                                    cursor: 'pointer',
                                    boxShadow: `0 0 20px ${C.neonGlow}`,
                                }}
                            >
                                Login
                            </button>
                        </form>

                        <p style={{
                            textAlign: 'center',
                            fontSize: '12px',
                            color: C.muted,
                            marginTop: '20px',
                        }}>
                            ✓ All data stored locally on your device
                        </p>
                    </div>
                </div>
            );
        }

        // ── SETTINGS VIEW ──
        function SettingsView({ onBack }) {
            const [customWords, setCustomWords] = useState(db.customWords);
            const [newWord, setNewWord] = useState('');

            function addWord() {
                if (!newWord.trim()) return;
                const word = newWord.trim();
                if (!customWords.includes(word)) {
                    setCustomWords([...customWords, word]);
                    db.customWords = [...customWords, word];
                    if (!db.wordCounts[word]) db.wordCounts[word] = 0;
                    saveDB();
                    setNewWord('');
                }
            }

            function removeWord(word) {
                const updated = customWords.filter(w => w !== word);
                setCustomWords(updated);
                db.customWords = updated;
                saveDB();
            }

            return (
                <div style={{
                    minHeight: '100vh',
                    background: C.bg,
                    color: C.text,
                    padding: '24px',
                }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '32px' }}>
                        <h1 style={{ fontSize: '32px', color: C.neon, textShadow: `0 0 20px ${C.neonGlow}` }}>⚙️ Settings</h1>
                        <button onClick={onBack} style={{
                            background: 'transparent',
                            border: 'none',
                            color: C.muted,
                            fontSize: '14px',
                            cursor: 'pointer',
                        }}>
                            ← Back
                        </button>
                    </div>

                    <div style={{ maxWidth: '600px', margin: '0 auto' }}>
                        {/* Custom Words Section */}
                        <div style={{
                            background: C.card,
                            border: `1px solid ${C.border}`,
                            borderRadius: '12px',
                            padding: '24px',
                            marginBottom: '20px',
                        }}>
                            <h2 style={{ fontSize: '18px', color: C.neon, marginBottom: '20px' }}>📝 Custom Words</h2>
                            <p style={{ color: C.muted, fontSize: '12px', marginBottom: '16px' }}>
                                Add up to 5 words to track during sessions. These will appear on your dashboard for live counting.
                            </p>

                            {/* Add Word */}
                            <div style={{ display: 'flex', gap: '8px', marginBottom: '20px' }}>
                                <input
                                    type="text"
                                    value={newWord}
                                    onChange={(e) => setNewWord(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && addWord()}
                                    placeholder="Enter a word..."
                                    style={{
                                        flex: 1,
                                        padding: '12px',
                                        background: C.surface,
                                        border: `1px solid ${C.border}`,
                                        borderRadius: '8px',
                                        color: C.text,
                                        fontSize: '14px',
                                        outline: 'none',
                                    }}
                                />
                                <button 
                                    onClick={addWord}
                                    disabled={customWords.length >= 5}
                                    style={{
                                        padding: '12px 24px',
                                        background: customWords.length >= 5 ? 'rgba(255, 140, 0, 0.2)' : `linear-gradient(135deg, #4a3000, ${C.neon})`,
                                        border: `1px solid ${C.neon}`,
                                        borderRadius: '8px',
                                        color: 'white',
                                        cursor: customWords.length >= 5 ? 'not-allowed' : 'pointer',
                                        fontWeight: 600,
                                    }}
                                >
                                    Add
                                </button>
                            </div>

                            {/* Word Tags */}
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                                {customWords.map((word) => (
                                    <div 
                                        key={word}
                                        style={{
                                            background: `rgba(255, 140, 0, 0.15)`,
                                            border: `1px solid ${C.neon}`,
                                            borderRadius: '20px',
                                            padding: '8px 16px',
                                            display: 'flex',
                                            alignItems: 'center',
                                            gap: '8px',
                                            color: C.neon,
                                        }}
                                    >
                                        <span>{word}</span>
                                        <button 
                                            onClick={() => removeWord(word)}
                                            style={{
                                                background: 'none',
                                                border: 'none',
                                                color: C.neon,
                                                cursor: 'pointer',
                                                fontSize: '16px',
                                            }}
                                        >
                                            ✕
                                        </button>
                                    </div>
                                ))}
                            </div>

                            {customWords.length === 0 && (
                                <div style={{
                                    padding: '16px',
                                    background: `rgba(255, 140, 0, 0.05)`,
                                    border: `1px dashed ${C.border}`,
                                    borderRadius: '8px',
                                    textAlign: 'center',
                                    color: C.muted,
                                    fontSize: '12px',
                                }}>
                                    No custom words yet. Add some to get started!
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ── SESSION VIEW ──
        function SessionView({ onFinish, onCancel }) {
            const [strokes, setStrokes] = useState(0);
            const [running, setRunning] = useState(false);
            const [elapsed, setElapsed] = useState(0);
            const [peakRate, setPeakRate] = useState(0);
            const [wordCounts, setWordCounts] = useState(db.customWords.reduce((a, w) => ({ ...a, [w]: 0 }), {}));
            
            // Session metadata
            const [partner, setPartner] = useState('Solo');
            const [location, setLocation] = useState('Home');
            const [content, setContent] = useState('');
            const [toys, setToys] = useState('');
            const [age, setAge] = useState('');
            const [rating, setRating] = useState(5);
            const [attractiveness, setAttractiveness] = useState(5);
            const [notes, setNotes] = useState('');
            const [showDetails, setShowDetails] = useState(false);

            const lastAccel = useRef({ x: 0, y: 0, z: 0 });
            const strokeCooldown = useRef(false);
            const timerRef = useRef(null);
            const recentStrokes = useRef([]);

            // Timer
            useEffect(() => {
                if (running) {
                    timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [running]);

            // Motion detection
            useEffect(() => {
                if (!running) return;

                function handleMotion(e) {
                    const acc = e.accelerationIncludingGravity;
                    if (!acc) return;
                    
                    const x = acc.x || 0;
                    const y = acc.y || 0;
                    const z = acc.z || 0;
                    
                    const deltaX = Math.abs(x - lastAccel.current.x);
                    const deltaY = Math.abs(y - lastAccel.current.y);
                    const deltaZ = Math.abs(z - lastAccel.current.z);
                    
                    const totalDelta = deltaX + deltaY + deltaZ;
                    
                    lastAccel.current = { x, y, z };

                    if (totalDelta > 4.5 && !strokeCooldown.current) {
                        strokeCooldown.current = true;
                        setStrokes(s => {
                            const next = s + 1;
                            const now = Date.now();
                            recentStrokes.current = [...recentStrokes.current.filter(t => now - t < 10000), now];
                            const spm = (recentStrokes.current.length / 10) * 60;
                            setPeakRate(p => Math.max(p, Math.round(spm)));
                            return next;
                        });
                        setTimeout(() => { strokeCooldown.current = false; }, 100);
                    }
                }

                window.addEventListener('devicemotion', handleMotion);
                return () => window.removeEventListener('devicemotion', handleMotion);
            }, [running]);

            function manualStroke() {
                if (!running) return;
                setStrokes(s => s + 1);
            }

            function incrementWord(word) {
                setWordCounts(wc => ({ ...wc, [word]: (wc[word] || 0) + 1 }));
            }

            function handleStart() {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission().then(r => {
                        if (r === 'granted') setRunning(true);
                    }).catch(() => setRunning(true));
                } else {
                    setRunning(true);
                }
            }

            function handleFinish() {
                setRunning(false);
                const spm = elapsed > 0 ? Math.round((strokes / elapsed) * 60) : 0;
                
                // Update word counts in db
                Object.keys(wordCounts).forEach(word => {
                    db.wordCounts[word] = (db.wordCounts[word] || 0) + wordCounts[word];
                });
                saveDB();

                onFinish({
                    id: Date.now(),
                    date: new Date().toISOString(),
                    strokes,
                    duration: elapsed,
                    spm,
                    peakRate,
                    partner,
                    location,
                    content,
                    toys,
                    age,
                    rating,
                    attractiveness,
                    notes,
                    wordCounts,
                });
            }

            const spm = elapsed > 0 ? Math.round((strokes / elapsed) * 60) : 0;
            const progress = Math.min((strokes / 200) * 100, 100);

            return (
                <div style={{
                    minHeight: '100vh',
                    background: C.bg,
                    color: C.text,
                    padding: '32px 24px 40px',
                    maxWidth: '440px',
                    margin: '0 auto',
                }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '40px' }}>
                        <button onClick={onCancel} style={{
                            background: 'none',
                            border: 'none',
                            color: C.muted,
                            fontSize: '14px',
                            cursor: 'pointer',
                        }}>
                            ← Cancel
                        </button>
                        <div style={{ fontFamily: 'monospace', fontSize: '18px', fontWeight: 700, color: C.neon }}>
                            {formatDuration(elapsed)}
                        </div>
                    </div>

                    {/* Stroke Counter */}
                    <div style={{ textAlign: 'center', marginBottom: '32px' }}>
                        <div style={{ fontSize: '11px', fontFamily: 'monospace', color: C.muted, marginBottom: '8px', textTransform: 'uppercase' }}>
                            Strokes
                        </div>
                        <div style={{
                            fontSize: 'clamp(80px,22vw,120px)',
                            fontWeight: 700,
                            color: running ? C.neon : C.neon,
                            textShadow: `0 0 60px ${C.neonGlow}`,
                        }}>
                            {strokes}
                        </div>
                        <div style={{ fontSize: '14px', color: C.muted, marginTop: '8px' }}>
                            {running ? `${spm} strokes/min` : 'Ready when you are'}
                        </div>
                    </div>

                    {/* Progress */}
                    <div style={{
                        height: '6px',
                        background: 'rgba(255, 140, 0, 0.1)',
                        borderRadius: '3px',
                        marginBottom: '32px',
                        overflow: 'hidden',
                    }}>
                        <div style={{
                            height: '100%',
                            width: `${progress}%`,
                            background: `linear-gradient(90deg, ${C.neon}, ${C.hot})`,
                            borderRadius: '3px',
                            transition: 'width 0.3s',
                            boxShadow: `0 0 10px ${C.neonGlow}`,
                        }} />
                    </div>

                    {/* Stats */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '10px', marginBottom: '32px' }}>
                        {[
                            { label: 'Peak SPM', val: peakRate || '—' },
                            { label: 'Duration', val: formatDuration(elapsed) },
                            { label: 'Current SPM', val: spm || '—' },
                        ].map(({ label, val }) => (
                            <div key={label} style={{
                                background: C.card,
                                border: `1px solid ${C.border}`,
                                borderRadius: '8px',
                                padding: '12px 8px',
                                textAlign: 'center',
                            }}>
                                <div style={{ fontSize: '18px', fontWeight: 700, color: C.neon }}>{val}</div>
                                <div style={{ fontSize: '9px', color: C.muted, marginTop: '3px', textTransform: 'uppercase' }}>
                                    {label}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Custom Word Counters */}
                    {db.customWords.length > 0 && (
                        <div style={{
                            background: C.card,
                            border: `1px solid ${C.border}`,
                            borderRadius: '8px',
                            padding: '16px',
                            marginBottom: '20px',
                        }}>
                            <div style={{ fontSize: '12px', color: C.muted, marginBottom: '12px', textTransform: 'uppercase' }}>
                                📊 Word Tracking
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(80px, 1fr))', gap: '8px' }}>
                                {db.customWords.map(word => (
                                    <button 
                                        key={word}
                                        onClick={() => incrementWord(word)}
                                        style={{
                                            background: `rgba(255, 140, 0, 0.1)`,
                                            border: `2px solid ${C.neon}`,
                                            borderRadius: '8px',
                                            padding: '12px 8px',
                                            color: C.neon,
                                            cursor: 'pointer',
                                            textAlign: 'center',
                                            transition: 'all 0.2s',
                                        }}
                                    >
                                        <div style={{ fontSize: '14px', fontWeight: 700 }}>{wordCounts[word] || 0}</div>
                                        <div style={{ fontSize: '11px', marginTop: '4px', color: C.muted }}>{word}</div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Details Toggle */}
                    <button onClick={() => setShowDetails(!showDetails)} style={{
                        width: '100%',
                        background: 'transparent',
                        border: `1px solid ${C.border}`,
                        borderRadius: '8px',
                        color: C.muted,
                        fontSize: '13px',
                        padding: '10px',
                        cursor: 'pointer',
                        marginBottom: '20px',
                    }}>
                        {showDetails ? '▼' : '▶'} Session Details
                    </button>

                    {showDetails && (
                        <div style={{ marginBottom: '20px', padding: '16px', background: C.card, borderRadius: '8px', border: `1px solid ${C.border}` }}>
                            {/* Partner */}
                            <div style={{ marginBottom: '16px' }}>
                                <label style={{ display: 'block', fontSize: '12px', color: C.muted, marginBottom: '6px', textTransform: 'uppercase' }}>
                                    Partner Type
                                </label>
                                <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                                    {['Solo', 'Partner', 'Group'].map(p => (
                                        <button key={p} onClick={() => setPartner(p)} style={{
                                            padding: '6px 12px',
                                            background: partner === p ? C.neon : 'transparent',
                                            border: `1px solid ${partner === p ? C.neon : C.border}`,
                                            borderRadius: '20px',
                                            color: partner === p ? '#000' : C.muted,
                                            fontSize: '12px',
                                            cursor: 'pointer',
                                        }}>
                                            {p}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Location */}
                            <div style={{ marginBottom: '16px' }}>
                                <label style={{ display: 'block', fontSize: '12px', color: C.muted, marginBottom: '6px', textTransform: 'uppercase' }}>
                                    Location
                                </label>
                                <input
                                    type="text"
                                    value={location}
                                    onChange={(e) => setLocation(e.target.value)}
                                    placeholder="e.g., Home, Work, Airplane..."
                                    style={{
                                        width: '100%',
                                        padding: '8px',
                                        background: C.surface,
                                        border: `1px solid ${C.border}`,
                                        borderRadius: '6px',
                                        color: C.text,
                                        fontSize: '12px',
                                        outline: 'none',
                                    }}
                                />
                            </div>

                            {/* Content/Website */}
                            <div style={{ marginBottom: '16px' }}>
                                <label style={{ display: 'block', fontSize: '12px', color: C.muted, marginBottom: '6px', textTransform: 'uppercase' }}>
                                    Content/Website (Optional)
                                </label>
                                <input
                                    type="text"
                                    value={content}
                                    onChange={(e) => setContent(e.target.value)}
                                    placeholder="Keep it discreet..."
                                    style={{
                                        width: '100%',
                                        padding: '8px',
                                        background: C.surface,
                                        border: `1px solid ${C.border}`,
                                        borderRadius: '6px',
                                        color: C.text,
                                        fontSize: '12px',
                                        outline: 'none',
                                    }}
                                />
                            </div>

                            {/* Toys */}
                            <div style={{ marginBottom: '16px' }}>
                                <label style={{ display: 'block', fontSize: '12px', color: C.muted, marginBottom: '6px', textTransform: 'uppercase' }}>
                                    Toys Used (Optional)
                                </label>
                                <input
                                    type="text"
                                    value={toys}
                                    onChange={(e) => setToys(e.target.value)}
                                    placeholder="e.g., Fleshlight, Dildo..."
                                    style={{
                                        width: '100%',
                                        padding: '8px',
                                        background: C.surface,
                                        border: `1px solid ${C.border}`,
                                        borderRadius: '6px',
                                        color: C.text,
                                        fontSize: '12px',
                                        outline: 'none',
                                    }}
                                />
                            </div>

                            {/* Age */}
                            {partner !== 'Solo' && (
                                <div style={{ marginBottom: '16px' }}>
                                    <label style={{ display: 'block', fontSize: '12px', color: C.muted, marginBottom: '6px', textTransform: 'uppercase' }}>
                                        Partner Age (Optional)
                                    </label>
                                    <input
                                        type="text"
                                        value={age}
                                        onChange={(e) => setAge(e.target.value)}
                                        placeholder="e.g., 25, 18-25..."
                                        style={{
                                            width: '100%',
                                            padding: '8px',
                                            background: C.surface,
                                            border: `1px solid ${C.border}`,
                                            borderRadius: '6px',
                                            color: C.text,
                                            fontSize: '12px',
                                            outline: 'none',
                                        }}
                                    />
                                </div>
                            )}

                            {/* Rating */}
                            <div style={{ marginBottom: '16px' }}>
                                <label style={{ display: 'block', fontSize: '12px', color: C.muted, marginBottom: '6px', textTransform: 'uppercase' }}>
                                    Experience Rating: {rating}/10
                                </label>
                                <input
                                    type="range"
                                    min="1"
                                    max="10"
                                    value={rating}
                                    onChange={(e) => setRating(parseInt(e.target.value))}
                                    style={{ width: '100%' }}
                                />
                            </div>

                            {/* Attractiveness */}
                            {partner !== 'Solo' && (
                                <div style={{ marginBottom: '16px' }}>
                                    <label style={{ display: 'block', fontSize: '12px', color: C.muted, marginBottom: '6px', textTransform: 'uppercase' }}>
                                        Attractiveness Rating: {attractiveness}/10
                                    </label>
                                    <input
                                        type="range"
                                        min="1"
                                        max="10"
                                        value={attractiveness}
                                        onChange={(e) => setAttractiveness(parseInt(e.target.value))}
                                        style={{ width: '100%' }}
                                    />
                                </div>
                            )}

                            {/* Notes */}
                            <div>
                                <label style={{ display: 'block', fontSize: '12px', color: C.muted, marginBottom: '6px', textTransform: 'uppercase' }}>
                                    Notes
                                </label>
                                <textarea
                                    value={notes}
                                    onChange={(e) => setNotes(e.target.value)}
                                    placeholder="Any additional notes..."
                                    style={{
                                        width: '100%',
                                        minHeight: '60px',
                                        padding: '8px',
                                        background: C.surface,
                                        border: `1px solid ${C.border}`,
                                        borderRadius: '6px',
                                        color: C.text,
                                        fontSize: '12px',
                                        outline: 'none',
                                        resize: 'vertical',
                                    }}
                                />
                            </div>
                        </div>
                    )}

                    {/* Controls */}
                    {!running ? (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                            <button onClick={handleStart} style={{
                                width: '100%',
                                padding: '20px',
                                background: `linear-gradient(135deg, #4a3000, ${C.neon})`,
                                border: `1px solid ${C.neon}`,
                                borderRadius: '12px',
                                color: 'white',
                                fontSize: '18px',
                                fontWeight: 700,
                                cursor: 'pointer',
                                boxShadow: `0 0 30px ${C.neonGlow}`,
                            }}>
                                {elapsed > 0 ? '▶ Resume' : '▶ Start Tracking'}
                            </button>
                            {elapsed > 0 && (
                                <button onClick={handleFinish} style={{
                                    width: '100%',
                                    padding: '16px',
                                    background: `linear-gradient(135deg, #6a1a1a, ${C.hot})`,
                                    border: `1px solid ${C.hot}`,
                                    borderRadius: '12px',
                                    color: 'white',
                                    fontSize: '16px',
                                    fontWeight: 700,
                                    cursor: 'pointer',
                                }}>
                                    ✓ Finish Session
                                </button>
                            )}
                            <button onClick={manualStroke} style={{
                                width: '100%',
                                padding: '12px',
                                background: 'transparent',
                                border: `1px dashed ${C.dim}`,
                                borderRadius: '8px',
                                color: C.dim,
                                fontSize: '12px',
                                cursor: 'pointer',
                            }}>
                                TAP TO SIMULATE (desktop testing)
                            </button>
                        </div>
                    ) : (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                            <button onClick={() => setRunning(false)} style={{
                                width: '100%',
                                padding: '20px',
                                background: 'rgba(255, 140, 0, 0.15)',
                                border: `1px solid ${C.neon}`,
                                borderRadius: '12px',
                                color: C.neon,
                                fontSize: '16px',
                                fontWeight: 700,
                                cursor: 'pointer',
                            }}>
                                ⏸ Pause
                            </button>
                            <button onClick={handleFinish} style={{
                                width: '100%',
                                padding: '16px',
                                background: `linear-gradient(135deg, #6a1a1a, ${C.hot})`,
                                border: `1px solid ${C.hot}`,
                                borderRadius: '12px',
                                color: 'white',
                                fontSize: '16px',
                                fontWeight: 700,
                                cursor: 'pointer',
                            }}>
                                ✓ Finish Session
                            </button>
                            <button onClick={manualStroke} style={{
                                width: '100%',
                                padding: '12px',
                                background: 'transparent',
                                border: `1px dashed ${C.dim}`,
                                borderRadius: '8px',
                                color: C.dim,
                                fontSize: '12px',
                                cursor: 'pointer',
                            }}>
                                TAP TO SIMULATE (desktop testing)
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // ── SUMMARY VIEW ──
        function SummaryView({ session, onHome }) {
            const { strokes, duration, spm, peakRate, partner, location, content, toys, age, rating, attractiveness, notes, date, wordCounts } = session;

            return (
                <div style={{
                    minHeight: '100vh',
                    background: C.bg,
                    color: C.text,
                    padding: '48px 24px 60px',
                    maxWidth: '440px',
                    margin: '0 auto',
                }}>
                    <div style={{ textAlign: 'center', marginBottom: '40px' }}>
                        <div style={{ fontSize: '11px', fontFamily: 'monospace', color: C.green, marginBottom: '12px', textTransform: 'uppercase' }}>
                            Session Complete
                        </div>
                        <div style={{
                            fontSize: 'clamp(60px,16vw,90px)',
                            fontWeight: 700,
                            color: C.neon,
                            textShadow: `0 0 50px ${C.neonGlow}`,
                            lineHeight: 1,
                            marginBottom: '8px',
                        }}>
                            {strokes}
                        </div>
                        <div style={{ fontSize: '16px', color: C.muted, fontStyle: 'italic' }}>total strokes</div>
                    </div>

                    {/* Stats Grid */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '28px' }}>
                        {[
                            { label: 'Duration', val: formatDuration(duration), color: C.neon },
                            { label: 'Avg Rate', val: `${spm}/min`, color: C.neon },
                            { label: 'Peak Rate', val: `${peakRate}/min`, color: C.gold },
                            { label: 'Rating', val: `${rating}/10`, color: C.green },
                            { label: 'Partner Type', val: partner, color: C.text },
                            { label: 'Location', val: location, color: C.text },
                        ].map(({ label, val, color }) => (
                            <div key={label} style={{
                                background: C.card,
                                border: `1px solid ${C.border}`,
                                borderRadius: '10px',
                                padding: '16px',
                            }}>
                                <div style={{ fontSize: '14px', fontWeight: 700, color }}>{val}</div>
                                <div style={{ fontSize: '10px', color: C.muted, marginTop: '4px', textTransform: 'uppercase' }}>
                                    {label}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Word Counts */}
                    {Object.values(wordCounts).some(c => c > 0) && (
                        <div style={{
                            background: C.card,
                            border: `1px solid ${C.border}`,
                            borderRadius: '10px',
                            padding: '16px',
                            marginBottom: '20px',
                        }}>
                            <div style={{ fontSize: '12px', color: C.muted, marginBottom: '12px', textTransform: 'uppercase' }}>
                                📊 Words Tracked
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px' }}>
                                {Object.entries(wordCounts).map(([word, count]) => (
                                    count > 0 && (
                                        <div key={word} style={{
                                            background: `rgba(255, 140, 0, 0.1)`,
                                            border: `1px solid ${C.neon}`,
                                            borderRadius: '8px',
                                            padding: '8px',
                                            textAlign: 'center',
                                        }}>
                                            <div style={{ fontSize: '16px', fontWeight: 700, color: C.neon }}>{count}</div>
                                            <div style={{ fontSize: '10px', color: C.muted }}>{word}</div>
                                        </div>
                                    )
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Details */}
                    {(content || toys || age || notes) && (
                        <div style={{
                            background: C.card,
                            border: `1px solid ${C.border}`,
                            borderRadius: '10px',
                            padding: '16px',
                            marginBottom: '20px',
                        }}>
                            <div style={{ fontSize: '12px', color: C.muted, marginBottom: '12px', textTransform: 'uppercase' }}>
                                📝 Details
                            </div>
                            {content && <div style={{ fontSize: '12px', marginBottom: '8px' }}>Content: <span style={{ color: C.neon }}>{content}</span></div>}
                            {toys && <div style={{ fontSize: '12px', marginBottom: '8px' }}>Toys: <span style={{ color: C.neon }}>{toys}</span></div>}
                            {age && <div style={{ fontSize: '12px', marginBottom: '8px' }}>Partner Age: <span style={{ color: C.neon }}>{age}</span></div>}
                            {notes && <div style={{ fontSize: '12px', whiteSpace: 'pre-wrap' }}>Notes: <span style={{ color: C.muted }}>{notes}</span></div>}
                        </div>
                    )}

                    {/* Timestamp */}
                    <div style={{
                        textAlign: 'center',
                        fontSize: '12px',
                        color: C.muted,
                        marginBottom: '20px',
                    }}>
                        {formatDate(date)} at {formatTime(date)}
                    </div>

                    {/* Button */}
                    <button onClick={onHome} style={{
                        width: '100%',
                        padding: '16px',
                        background: `linear-gradient(135deg, #4a3000, ${C.neon})`,
                        border: `1px solid ${C.neon}`,
                        borderRadius: '10px',
                        color: 'white',
                        fontSize: '16px',
                        fontWeight: 700,
                        cursor: 'pointer',
                        boxShadow: `0 0 20px ${C.neonGlow}`,
                    }}>
                        ← Back to Home
                    </button>
                </div>
            );
        }

        // ── HOME VIEW ──
        function HomeView({ onNewSession, onSettings }) {
            const stats = getCleverStats(db.sessions);

            return (
                <div style={{
                    minHeight: '100vh',
                    background: C.bg,
                    color: C.text,
                    padding: '32px 24px 40px',
                    maxWidth: '900px',
                    margin: '0 auto',
                }}>
                    {/* Header */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '40px' }}>
                        <div>
                            <div style={{ fontSize: '12px', color: C.muted, marginBottom: '4px', textTransform: 'uppercase' }}>
                                Welcome, {db.user?.username || 'User'}
                            </div>
                            <h1 style={{ fontSize: '36px', color: C.neon, textShadow: `0 0 20px ${C.neonGlow}` }}>
                                🍆 JackTracker
                            </h1>
                        </div>
                        <button onClick={onSettings} style={{
                            background: C.card,
                            border: `1px solid ${C.border}`,
                            borderRadius: '8px',
                            padding: '10px 14px',
                            color: C.muted,
                            fontSize: '18px',
                            cursor: 'pointer',
                        }}>
                            ⚙️
                        </button>
                    </div>

                    {/* Quick Stats */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '12px', marginBottom: '32px' }}>
                        {[
                            { label: 'Total Sessions', val: stats.totalSessions, color: C.neon },
                            { label: 'Total Strokes', val: stats.totalStrokes, color: C.gold },
                            { label: 'Avg Strokes', val: stats.avgStrokes, color: C.green },
                            { label: 'Peak SPM', val: stats.peakRate, color: C.hot },
                        ].map(({ label, val, color }) => (
                            <div key={label} style={{
                                background: C.card,
                                border: `1px solid ${C.border}`,
                                borderRadius: '10px',
                                padding: '16px',
                                textAlign: 'center',
                            }}>
                                <div style={{ fontSize: '24px', fontWeight: 700, color }}>{val}</div>
                                <div style={{ fontSize: '10px', color: C.muted, marginTop: '6px', textTransform: 'uppercase' }}>
                                    {label}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* New Session Button */}
                    <button onClick={onNewSession} style={{
                        width: '100%',
                        padding: '24px',
                        background: `linear-gradient(135deg, #4a3000, ${C.neon})`,
                        border: `2px solid ${C.neon}`,
                        borderRadius: '12px',
                        color: 'white',
                        fontSize: '20px',
                        fontWeight: 700,
                        cursor: 'pointer',
                        boxShadow: `0 0 40px ${C.neonGlow}`,
                        marginBottom: '32px',
                    }}>
                        + New Session
                    </button>

                    {/* Recent Sessions */}
                    {db.sessions.length > 0 && (
                        <div>
                            <h2 style={{ fontSize: '18px', color: C.neon, marginBottom: '16px' }}>📋 Recent Sessions</h2>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '12px' }}>
                                {[...db.sessions].reverse().slice(0, 6).map((session) => (
                                    <div key={session.id} style={{
                                        background: C.card,
                                        border: `1px solid ${C.border}`,
                                        borderRadius: '10px',
                                        padding: '16px',
                                    }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '12px' }}>
                                            <div>
                                                <div style={{ fontSize: '14px', fontWeight: 700, color: C.neon }}>{session.strokes}</div>
                                                <div style={{ fontSize: '10px', color: C.muted }}>strokes</div>
                                            </div>
                                            <div style={{ textAlign: 'right' }}>
                                                <div style={{ fontSize: '12px', color: C.gold }}>{session.spm} SPM</div>
                                                <div style={{ fontSize: '10px', color: C.muted }}>{formatDate(session.date)}</div>
                                            </div>
                                        </div>
                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px', fontSize: '11px' }}>
                                            <div><span style={{ color: C.muted }}>Location:</span> {session.location}</div>
                                            <div><span style={{ color: C.muted }}>Partner:</span> {session.partner}</div>
                                            <div><span style={{ color: C.muted }}>Duration:</span> {formatDuration(session.duration)}</div>
                                            <div><span style={{ color: C.muted }}>Rating:</span> {session.rating}/10</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {db.sessions.length === 0 && (
                        <div style={{
                            textAlign: 'center',
                            padding: '40px 20px',
                            background: C.card,
                            border: `1px dashed ${C.border}`,
                            borderRadius: '10px',
                            color: C.muted,
                        }}>
                            <div style={{ fontSize: '40px', marginBottom: '12px' }}>📊</div>
                            <div>No sessions yet. Start tracking to see your stats!</div>
                        </div>
                    )}
                </div>
            );
        }

        // ── APP COMPONENT ──
        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(() => !!db.user);
            const [view, setView] = useState('home');
            const [sessions, setSessions] = useState(db.sessions);

            function handleNewSession(session) {
                db.sessions.push(session);
                setSessions([...db.sessions]);
                saveDB();
                setView('summary');
            }

            function handleSummaryHome() {
                setView('home');
            }

            if (!isLoggedIn) return <LoginScreen onLogin={() => setIsLoggedIn(true)} />;

            if (view === 'session') return <SessionView onFinish={handleNewSession} onCancel={() => setView('home')} />;
            if (view === 'summary' && db.sessions.length > 0) return <SummaryView session={db.sessions[db.sessions.length - 1]} onHome={handleSummaryHome} />;

            return <HomeView onNewSession={() => setView('session')} onSettings={() => setView('settings')} />;
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
